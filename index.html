<!DOCTYPE html>
<html>
<head>
  <title>MP3 to WAV Converter</title>
  <style>
    body { font-family: Arial; text-align:center; margin-top:50px; }
    button { padding:10px 20px; background:green; color:white; border:none; cursor:pointer; }
  </style>
</head>
<body>

<h2>Upload MP3 to Convert to WAV</h2>

<form id="uploadForm">
  <input type="file" name="audio" accept=".mp3" required />
  <br><br>
  <button type="submit">Convert</button>
</form>

<p id="status"></p>

<script>
document.getElementById('uploadForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const formData = new FormData(this);
  document.getElementById('status').innerText = "Converting...";

  const response = await fetch('/convert', {
    method: 'POST',
    body: formData
  });

  if (response.ok) {
    const blob = await response.blob();
    const url = window.URL.createObjectURL(blob);

    const a = document.createElement('a');
    a.href = url;
    a.download = "converted.wav";
    a.click();

    document.getElementById('status').innerText = "Download started!";
  } else {
    document.getElementById('status').innerText = "Conversion failed.";
  }
});
</script>

</body>
</html>
