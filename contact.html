<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | AudioConvert</title>
<meta name="description" content="Contact AudioConvert for support or inquiries about our MP3 to WAV converter.">
<style>
/* Same CSS as above */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif;}
header{background:#111;color:white;padding:15px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:1000;}
.logo{font-size:22px;font-weight:bold;}
nav a{color:white;margin-left:20px;text-decoration:none;}
.menu-toggle{font-size:26px;cursor:pointer;display:none;}
.container{max-width:900px;margin:auto;padding:40px 20px;}
footer{background:#111;color:white;text-align:center;padding:20px;margin-top:40px;}
footer a{color:#aaa;margin:0 10px;text-decoration:none;}
footer a:hover{color:white;}
@media(max-width:768px){.menu-toggle{display:block;}nav{display:none;position:absolute;top:60px;left:0;width:100%;background:#111;flex-direction:column;text-align:center;}nav a{display:block;padding:15px;border-top:1px solid #333;}nav.active{display:flex;}}
.content{line-height:1.7;margin-top:30px;}
input, textarea{width:100%;padding:10px;margin-top:10px;margin-bottom:20px;border-radius:5px;border:1px solid #ccc;}
button{padding:12px 25px;background:#28a745;color:white;border:none;border-radius:6px;cursor:pointer;}
button:hover{background:#218838;}
</style>
</head>
<body>

<header>
<div class="logo">AudioConvert</div>
<div class="menu-toggle" onclick="toggleMenu()">☰</div>
<nav id="navMenu">
<a href="/">Home</a>
<a href="/about.html">About</a>
<a href="/contact.html">Contact</a>
<a href="/privacy.html">Privacy</a>
</nav>
</header>

<div class="container content">
<h1>Contact Us</h1>
<p>If you have any questions, suggestions, or feedback, please use the form below.</p>

<form action="mailto:support@yourdomain.com" method="post" enctype="text/plain">
<label>Name</label>
<input type="text" name="name" required>
<label>Email</label>
<input type="email" name="email" required>
<label>Message</label>
<textarea name="message" rows="6" required></textarea>
<button type="submit">Send Message</button>
</form>
</div>

<footer>
<p>
<a href="/about.html">About</a> |
<a href="/privacy.html">Privacy Policy</a> |
<a href="/terms.html">Terms</a> |
<a href="/contact.html">Contact</a>
</p>
<p>© 2026 AudioConvert</p>
</footer>

<script>
function toggleMenu(){document.getElementById("navMenu").classList.toggle("active");}
</script>

</body>
</html>
